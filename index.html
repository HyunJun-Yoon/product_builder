<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Photo Classifier</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="language-toggle">
            <button id="langToggleKo" class="lang-button active">한국어</button>
            <button id="langToggleEn" class="lang-button">English</button>
        </div>
        <h1>AI image detector</h1>

        <label for="imageUpload" class="upload-area">
            <input type="file" id="imageUpload" accept="image/*">
            <p>Drag & Drop your image here, or click to select file</p>
            <p>(.jpg, .png, .webp, etc.)</p>
        </label>
        <div class="image-preview" id="imagePreview">
            <img id="previewImage" src="#" alt="Image Preview">
            <p>Upload an image to get started.</p>
        </div>

        <button id="classifyButton" disabled>Detect AI</button>

        <div class="results" id="results">
            <h2>Detection Results</h2>
            <ul id="predictionsList">
                <!-- Predictions will be inserted here -->
            </ul>
        </div>
    </div>

    <!-- Transformers.js CDN -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2"></script>
    <!-- Our application logic -->
    <script type="module" src="main.js"></script>
</body>
</html>
