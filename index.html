<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lotto Number Generator</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="container">
    <button id="theme-toggle">Toggle Theme</button>
    <h1>Lotto Number Generator</h1>

    <div class="controls">
      <label for="num-balls">Number of Balls:</label>
      <input type="number" id="num-balls" value="6" min="1" max="10">

      <label for="max-range">Max Range:</label>
      <input type="number" id="max-range" value="49" min="1" max="99">

      <button id="generate-lotto">Generate Numbers</button>
    </div>

    <div id="lotto-numbers">
      <!-- Lotto numbers will be displayed here -->
    </div>
  </div>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
